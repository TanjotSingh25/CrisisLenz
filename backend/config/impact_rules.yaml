# Crisis Lens — Estimated Operational Impact Radius Rules
#
# Values are in kilometres.
# These are estimated operational-impact zones for demo purposes —
# NOT scientifically modelled affected areas.
#
# Usage: if Gemini classifies an event as event_type=wildfire, severity=high,
# the system uses a 150km radius to find nearby client assets.
#
# Edit freely. Unknown event types fall back to "default".

